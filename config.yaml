# llm-pm-bench config
#
# Point this at any OpenAI-compatible chat completions endpoint:
#   - LiteLLM proxy            https://docs.litellm.ai
#   - Ollama                   http://localhost:11434/v1  (set api_key to "ollama")
#   - vLLM                     http://localhost:8000/v1
#   - OpenAI directly          https://api.openai.com/v1
#   - Anthropic via proxy      requires LiteLLM or similar
#   - DashScope (Alibaba)      https://dashscope.aliyuncs.com/compatible-mode/v1
#   - Any self-hosted gateway

endpoint: https://api.openai.com/v1

# API key — DO NOT hardcode here for git-tracked repos.
# Either:
#   1. Leave api_key unset and put LLM_API_KEY=... in .env (recommended)
#   2. Set api_key_env to a different env var name
#   3. Hardcode api_key for quick local testing only
api_key_env: LLM_API_KEY

# Optional: LiteLLM-compatible usage endpoint (for scripts/usage.py).
# Leave commented out if your provider doesn't support it.
# usage_endpoint: https://your-gateway.example.com/internal/key-usage

# Models you want to evaluate. `id` must match what your endpoint accepts.
# `label` is for human-readable reports.
models:
  - id: gpt-4o-mini
    label: GPT-4o Mini
    max_output: 8192

  - id: gpt-4o
    label: GPT-4o
    max_output: 8192

  # Add your local / self-hosted / alternative models here:
  # - id: kimi-k2.5
  #   label: Kimi K2.5
  #   max_output: 8192
  # - id: llama3.3:70b
  #   label: Llama 3.3 70B (Ollama)
  #   max_output: 4096

defaults:
  temperature: 0.3
  timeout: 180  # seconds; long inputs may need more

# Optional baseline label (for reports). The baseline is generated by
# the orchestrator (Claude Code session, ChatGPT, or human) outside the
# automated pipeline — see runs/<dir>/claude-baseline/ in the example.
baseline:
  label: Claude / ChatGPT (orchestrator session)
  notes: Generated outside the automated runner; serves as the reference.
